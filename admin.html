<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen p-6">

<div class="max-w-6xl mx-auto">

    <div class="flex justify-between items-center mb-8">

        <div>
            <h1 class="text-4xl font-bold text-lime-400">
                Admin Dashboard
            </h1>

            <p
                id="weekDisplay"
                class="text-slate-400 mt-2"
            >
                Loading week...
            </p>
        </div>

        <button
            id="logoutBtn"
            class="bg-red-500 hover:bg-red-400 px-4 py-2 rounded-lg font-semibold"
        >
            Logout
        </button>

    </div>

    <div class="grid md:grid-cols-2 gap-6 mb-8">

        <div class="bg-slate-800 p-6 rounded-xl">
            <h2 class="text-2xl font-bold text-lime-400 mb-4">
                Boys Team
            </h2>

            <p id="boysSubmitted"></p>

            <ul
                id="boysMissing"
                class="mt-4 space-y-2"
            ></ul>
        </div>

        <div class="bg-slate-800 p-6 rounded-xl">
            <h2 class="text-2xl font-bold text-pink-400 mb-4">
                Girls Team
            </h2>

            <p id="girlsSubmitted"></p>

            <ul
                id="girlsMissing"
                class="mt-4 space-y-2"
            ></ul>
        </div>

    </div>

    <div class="bg-slate-800 p-6 rounded-xl">

        <h2 class="text-2xl font-bold text-lime-400 mb-4">
            This Week's Submissions
        </h2>

        <div
            id="submissionList"
            class="space-y-2"
        ></div>

    </div>

</div>

    <div
  id="adminPanel"
  class="hidden mt-8 bg-slate-800 p-6 rounded-xl"
>
  <h2 class="text-2xl font-bold text-lime-400 mb-4">
    Admin Panel
  </h2>

  <p class="text-slate-400">
    Loading admin tools...
  </p>
</div>

<script type="module" src="./js/admin.js"></script>

</body>
</html>
