<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BITS Goa Tennis Fitness Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen">

<div class="max-w-5xl mx-auto p-6">

    <div class="text-center mb-10">

        <h1 class="text-5xl font-bold text-lime-400">
            Tennis Fitness Tracker
        </h1>

        <p class="text-slate-400 mt-3">
            Team Fitness Leaderboards
        </p>

        <p
  id="currentWeek"
  class="text-slate-400 text-sm mb-6"
>
  Loading week...
</p>

        <a
            href="login.html"
            class="inline-block mt-6 bg-lime-500 hover:bg-lime-400 text-black font-bold px-6 py-3 rounded-lg"
        >
            Login
        </a>

    </div>

    <div class="grid md:grid-cols-2 gap-6">

        <div class="bg-slate-800 rounded-xl p-6">

            <h2 class="text-2xl font-bold text-blue-400 mb-4">
                🏆 Boys Team
            </h2>

            <div id="boysLeaderboard">
                Loading...
            </div>

        </div>

        <div class="bg-slate-800 rounded-xl p-6">

            <h2 class="text-2xl font-bold text-pink-400 mb-4">
                🏆 Girls Team
            </h2>

            <div id="girlsLeaderboard">
                Loading...
            </div>

        </div>

    </div>

</div>

<script type="module" src="./js/leaderboard.js"></script>

</body>
</html>
